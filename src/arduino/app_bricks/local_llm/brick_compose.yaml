services:
  llamacpp-models-runner:
    image: ${DOCKER_REGISTRY_BASE:-ghcr.io/arduino/}app-bricks/llamacpp-models-runner:dev-latest
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    working_dir: /models     
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:9999:9999
    mem_limit: 10g
    oom_kill_disable: false
    shm_size: 2g
    volumes:
      - ${APPLAB_DOWNLOADED_LLAMA_CPP_MODELS:-/home/arduino/models/llamacpp/}:/models/
  ollama-models-runner:
    image: ${DOCKER_REGISTRY_BASE:-ghcr.io/arduino/}app-bricks/ollama-models-runner:dev-latest
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    working_dir: /models     
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:11434:11434
    mem_limit: 10g
    oom_kill_disable: false
    shm_size: 2g
    volumes:
      - ${APPLAB_DOWNLOADED_OLLAMA_MODELS:-/home/arduino/models/ollama/}:/models/      
